<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>马年吉祥 - 纯CSS绘制</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        /* 主图案容器 */
        .horse-blessing {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 40px;
        }

        /* 背景圆盘 - 传统中国红渐变 */
        .disc {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center,
                    #d32f2f 0%,
                    #b71c1c 30%,
                    #8b0000 70%,
                    #5d0000 100%);
            border-radius: 50%;
            box-shadow:
                0 0 60px rgba(211, 47, 47, 0.5),
                inset 0 0 40px rgba(255, 255, 255, 0.1);
        }

        /* 金色边框 */
        .disc::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background: linear-gradient(45deg,
                    #ffd700 0%,
                    #ffed4e 25%,
                    #ffd700 50%,
                    #daa520 75%,
                    #b8860b 100%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(5px);
            animation: goldGlow 4s ease-in-out infinite;
        }

        /* 内圈装饰 */
        .disc::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 2px solid rgba(255, 215, 0, 0.5);
            border-radius: 50%;
            box-shadow:
                inset 0 0 20px rgba(255, 215, 0, 0.3),
                0 0 20px rgba(255, 215, 0, 0.2);
        }

        /* 马头主图案 */
        .horse-head {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 180px;
            height: 180px;
            transform: translate(-50%, -50%);
        }

        /* 马脸轮廓 */
        .horse-head::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 60px;
            width: 60px;
            height: 80px;
            background: #8b4513;
            border-radius: 50% 50% 40% 40%;
            transform: rotate(-5deg);
            box-shadow:
                inset 0 5px 10px rgba(0, 0, 0, 0.3),
                0 2px 0 #a0522d;
        }

        /* 马耳 */
        .horse-head::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 85px;
            width: 15px;
            height: 30px;
            background: #8b4513;
            border-radius: 50% 50% 0 0;
            transform: rotate(-20deg);
            box-shadow:
                -5px 0 0 #8b4513,
                0 2px 0 #a0522d;
        }

        /* 马鬃毛 */
        .mane {
            position: absolute;
            top: 25px;
            left: 45px;
            width: 40px;
            height: 60px;
            background: #4a3520;
            border-radius: 20px 0 0 20px;
            transform: rotate(5deg);
        }

        .mane::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 0;
            width: 100%;
            height: 15px;
            background: #5d4037;
            border-radius: 10px;
        }

        .mane::after {
            content: '';
            position: absolute;
            top: 25px;
            left: 0;
            width: 100%;
            height: 15px;
            background: #5d4037;
            border-radius: 10px;
        }

        /* 眼睛 */
        .eye {
            position: absolute;
            top: 50px;
            left: 85px;
            width: 20px;
            height: 20px;
            background: #000;
            border-radius: 50%;
            box-shadow:
                0 0 5px #fff,
                inset 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .eye::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            filter: blur(1px);
        }

        /* 鼻子 */
        .nose {
            position: absolute;
            top: 85px;
            left: 100px;
            width: 25px;
            height: 15px;
            background: #a0522d;
            border-radius: 50%;
        }

        /* 祥云装饰 */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            filter: blur(5px);
            animation: float 6s ease-in-out infinite;
        }

        .cloud1 {
            top: 20px;
            left: 50px;
            width: 40px;
            height: 20px;
            animation-delay: 0s;
        }

        .cloud2 {
            top: 60px;
            right: 30px;
            width: 60px;
            height: 30px;
            animation-delay: 1s;
        }

        .cloud3 {
            bottom: 40px;
            left: 30px;
            width: 50px;
            height: 25px;
            animation-delay: 2s;
        }

        .cloud4 {
            bottom: 20px;
            right: 50px;
            width: 45px;
            height: 22px;
            animation-delay: 3s;
        }

        /* 文字装饰 */
        .chinese-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
        }

        .character {
            position: absolute;
            color: #ffd700;
            font-size: 48px;
            font-weight: bold;
            text-shadow:
                0 0 10px rgba(255, 215, 0, 0.5),
                0 0 20px rgba(255, 215, 0, 0.3);
            opacity: 0.8;
        }

        .ma {
            top: 20px;
            left: 20px;
        }

        .nian {
            top: 20px;
            right: 20px;
        }

        .ji {
            bottom: 20px;
            left: 20px;
        }

        .xiang {
            bottom: 20px;
            right: 20px;
        }

        /* 底部装饰性文字 */
        .greeting {
            margin-top: 30px;
            color: #fff;
        }

        .greeting h1 {
            font-size: 36px;
            background: linear-gradient(45deg, #ffd700, #ffed4e, #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .greeting p {
            color: #ccc;
            font-size: 18px;
            opacity: 0.8;
        }

        /* 动画 */
        @keyframes goldGlow {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.02);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) scale(1);
                opacity: 0.8;
            }

            50% {
                transform: translateY(-10px) scale(1.1);
                opacity: 1;
            }
        }

        /* 响应式调整 */
        @media (max-width: 480px) {
            .horse-blessing {
                width: 250px;
                height: 250px;
            }

            .greeting h1 {
                font-size: 28px;
            }

            .greeting p {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="horse-blessing">
            <!-- 背景圆盘 -->
            <div class="disc"></div>

            <!-- 祥云装饰 -->
            <div class="cloud cloud1"></div>
            <div class="cloud cloud2"></div>
            <div class="cloud cloud3"></div>
            <div class="cloud cloud4"></div>

            <!-- 马头图案 -->
            <div class="horse-head">
                <div class="mane"></div>
                <div class="eye"></div>
                <div class="nose"></div>
            </div>

            <!-- 文字装饰 -->
            <div class="chinese-text">
                <div class="character ma">马</div>
                <div class="character nian">年</div>
                <div class="character ji">吉</div>
                <div class="character xiang">祥</div>
            </div>
        </div>

        <div class="greeting">
            <h1>丙午马年 吉祥如意</h1>
            <p>2026 农历丙午年 · 新春快乐</p>
        </div>
    </div>

    <script>
        // 添加微交互效果
        document.querySelector('.horse-blessing').addEventListener('mouseenter', function () {
            this.style.transform = 'scale(1.05)';
            this.style.transition = 'transform 0.3s ease';
        });

        document.querySelector('.horse-blessing').addEventListener('mouseleave', function () {
            this.style.transform = 'scale(1)';
        });
    </script>
</body>

</html>
